<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои заказы - Ванильный дом</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ЛК ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #7B3F00;
            --secondary-color: #D4A76A;
            --accent-color: #FF9E6D;
            --light-bg: #FFFDF5;
            --text-dark: #3A2615;
            --text-light: #8B7355;
            --border-radius: 20px;
            --transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.7;
            color: var(--text-dark);
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
        }

        /* ===== SIDEBAR ===== */
        .profile-sidebar {
            width: 280px;
            background: white;
            border-right: 1px solid #eee;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 30px 20px;
            border-bottom: 1px solid #eee;
        }

        .back-to-site {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            flex-shrink: 0;
        }

        .user-details h3 {
            margin-bottom: 5px;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .user-details p {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        .user-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #FFF9F0;
            color: var(--primary-color);
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Sidebar Navigation */
        .sidebar-nav {
            flex: 1;
            padding: 20px 0;
        }

        .sidebar-nav ul {
            list-style: none;
        }

        .sidebar-nav li {
            margin-bottom: 5px;
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            color: var(--text-dark);
            text-decoration: none;
            transition: var(--transition);
            position: relative;
        }

        .sidebar-nav a:hover {
            background: #f8f9fa;
            color: var(--primary-color);
        }

        .sidebar-nav li.active a {
            background: linear-gradient(90deg, rgba(123, 63, 0, 0.1), transparent);
            color: var(--primary-color);
            border-right: 3px solid var(--primary-color);
        }

        .sidebar-nav a i {
            width: 20px;
            text-align: center;
        }

        .badge {
            margin-left: auto;
            background: var(--accent-color);
            color: white;
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .bonus-badge {
            background: var(--secondary-color);
        }

        .new-badge {
            background: #10B981;
        }

        .divider {
            height: 1px;
            background: #eee;
            margin: 20px 0;
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #eee;
        }

        .loyalty-card {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 20px;
            border-radius: var(--border-radius);
        }

        .loyalty-progress {
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: white;
            border-radius: 3px;
            width: 65%;
        }

        .loyalty-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .loyalty-level {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        /* ===== MAIN CONTENT ===== */
        .profile-content {
            flex: 1;
            margin-left: 280px;
            padding: 30px;
            max-width: calc(100% - 280px);
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .content-header h1 {
            color: var(--primary-color);
            font-size: 2.2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 25px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 100%;
            background: linear-gradient(135deg, var(--secondary-color), var(--accent-color));
            transition: var(--transition);
            z-index: -1;
        }

        .btn:hover::before {
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
        }

        .btn-outline::before {
            display: none;
        }

        .btn-outline:hover {
            background: var(--primary-color);
            color: white;
        }

        .btn-sm {
            padding: 8px 15px;
            font-size: 0.9rem;
        }

        /* Sections */
        .section {
            background: white;
            border-radius: var(--border-radius);
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-header h2 {
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .view-all {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Orders Filter */
        .orders-filter {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            background: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 50px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            color: var(--text-light);
        }

        .filter-btn.active,
        .filter-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* Orders List */
        .orders-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .order-card {
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 25px;
            transition: var(--transition);
            position: relative;
        }

        .order-card:hover {
            border-color: var(--primary-color);
            box-shadow: var(--shadow);
            transform: translateY(-3px);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #f5f5f5;
        }

        .order-id {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .order-date {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .order-status {
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .order-status.delivered {
            background: #D1FAE5;
            color: #065F46;
        }

        .order-status.processing {
            background: #FEF3C7;
            color: #92400E;
        }

        .order-status.cancelled {
            background: #FEE2E2;
            color: #991B1B;
        }

        .order-status.pending {
            background: #E0F2FE;
            color: #075985;
        }

        .order-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .order-items {
            grid-column: span 2;
        }

        .order-items h4 {
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f5;
        }

        .item-name {
            flex: 2;
            color: var(--text-dark);
        }

        .item-quantity {
            flex: 1;
            text-align: center;
            color: var(--text-light);
        }

        .item-price {
            flex: 1;
            text-align: right;
            font-weight: 600;
            color: var(--primary-color);
        }

        .order-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
        }

        .info-label {
            color: var(--text-light);
        }

        .info-value {
            font-weight: 600;
            color: var(--text-dark);
        }

        .order-total {
            font-weight: 700;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .order-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            font-size: 4rem;
            color: #eee;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: var(--primary-color);
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--text-light);
            max-width: 400px;
            margin: 0 auto 30px;
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 40px;
        }

        .page-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid #eee;
            background: white;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn.active,
        .page-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .page-btn.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .page-btn.disabled:hover {
            background: white;
            color: inherit;
            border-color: #eee;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .profile-sidebar {
                width: 250px;
            }

            .profile-content {
                margin-left: 250px;
                max-width: calc(100% - 250px);
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .profile-sidebar {
                position: static;
                width: 100%;
                height: auto;
            }

            .profile-content {
                margin-left: 0;
                max-width: 100%;
            }

            .order-details {
                grid-template-columns: 1fr;
            }

            .order-actions {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .profile-content {
                padding: 20px 15px;
            }

            .content-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .section {
                padding: 20px;
            }

            .orders-filter {
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <div class="profile-sidebar">
        <div class="sidebar-header">
            <a href="index.html" class="back-to-site">
                <i class="fas fa-arrow-left"></i> На сайт
            </a>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">А</div>
                <div class="user-details">
                    <h3 id="userName">Анна Петрова</h3>
                    <p id="userEmail">anna@example.com</p>
                    <span class="user-status"><i class="fas fa-crown"></i> Gold статус</span>
                </div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="profile-index.html">
                        <i class="fas fa-home"></i>
                        <span>Обзор</span>
                    </a>
                </li>
                <li class="active">
                    <a href="profile-orders.html">
                        <i class="fas fa-shopping-bag"></i>
                        <span>Мои заказы</span>
                        <span class="badge" id="ordersCount">5</span>
                    </a>
                </li>
                <li>
                    <a href="profile-bonuses.html">
                        <i class="fas fa-gift"></i>
                        <span>Бонусы</span>
                        <span class="badge bonus-badge" id="bonusesCount">150</span>
                    </a>
                </li>
                <li>
                    <a href="profile-addresses.html">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>Адреса</span>
                        <span class="badge" id="addressesCount">2</span>
                    </a>
                </li>
                <li>
                    <a href="profile-promotions.html">
                        <i class="fas fa-percentage"></i>
                        <span>Акции</span>
                        <span class="badge new-badge">3</span>
                    </a>
                </li>
                <li>
                    <a href="profile-settings.html">
                        <i class="fas fa-cog"></i>
                        <span>Настройки</span>
                    </a>
                </li>
                <li class="divider"></li>
                <li>
                    <a href="#" id="logoutBtn">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Выйти</span>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="sidebar-footer">
            <div class="loyalty-card">
                <div class="loyalty-progress">
                    <div class="progress-bar">
                        <div class="progress"></div>
                    </div>
                    <span>До следующего уровня: 350 ₽</span>
                </div>
                <div class="loyalty-info">
                    <div class="loyalty-level">
                        <i class="fas fa-crown"></i>
                        <span>Gold</span>
                    </div>
                    <div class="loyalty-benefits">
                        <small>Скидка 10% · Приоритетная доставка</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="profile-content">
        <div class="content-header">
            <h1>Мои заказы</h1>
            <div class="header-actions">
                <button class="btn" onclick="window.location.href='index.html#menu'">
                    <i class="fas fa-plus"></i> Новый заказ
                </button>
            </div>
        </div>

        <!-- Orders Filter -->
        <div class="orders-filter">
            <button class="filter-btn active" data-filter="all">Все заказы</button>
            <button class="filter-btn" data-filter="delivered">Доставленные</button>
            <button class="filter-btn" data-filter="processing">В обработке</button>
            <button class="filter-btn" data-filter="pending">Ожидают доставки</button>
            <button class="filter-btn" data-filter="cancelled">Отмененные</button>
        </div>

        <!-- Orders List -->
        <div class="section">
            <div class="section-header">
                <h2>История заказов</h2>
                <div class="orders-count">
                    <span id="filteredCount">5</span> заказов
                </div>
            </div>

            <div class="orders-list" id="ordersList">
                <!-- Заполняется через JavaScript -->
            </div>

            <!-- Pagination -->
            <div class="pagination">
                <button class="page-btn prev-btn" disabled>
                    <i class="fas fa-chevron-left"></i>
                </button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn next-btn">
                    <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>

        <!-- Order Details Modal -->
        <div class="section" id="orderDetails" style="display: none;">
            <div class="section-header">
                <h2 id="detailOrderId">Заказ #001</h2>
                <button class="btn btn-outline btn-sm" onclick="hideOrderDetails()">
                    <i class="fas fa-arrow-left"></i> Назад к заказам
                </button>
            </div>
            <div id="orderDetailContent">
                <!-- Детали заказа заполняются через JavaScript -->
            </div>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (!DB.checkAuthRedirect()) return;
            loadUserData();
            loadOrders();
        });

        function loadUserData() {
            const user = DB.getCurrentUser();
            if (user) {
                document.getElementById('userName').textContent = user.name;
                document.getElementById('userEmail').textContent = user.email;
                document.getElementById('userAvatar').textContent = user.name.charAt(0).toUpperCase();
                document.getElementById('ordersCount').textContent = user.ordersCount || 0;

                const bonuses = DB.getUserBonuses(user.id);
                document.getElementById('bonusesCount').textContent = bonuses;

                const addresses = DB.getUserAddresses(user.id);
                document.getElementById('addressesCount').textContent = addresses.length;
            }
        }

        function loadOrders(filter = 'all') {
            const user = DB.getCurrentUser();
            if (!user) return;

            let orders = DB.getUserOrders(user.id).sort((a, b) => new Date(b.date) - new Date(a.date));

            if (filter !== 'all') {
                orders = orders.filter(o => o.status === filter);
            }

            const ordersList = document.getElementById('ordersList');
            document.getElementById('filteredCount').textContent = orders.length;

            if (orders.length === 0) {
                ordersList.innerHTML = `<div class="empty-state"><div class="empty-icon"><i class="fas fa-shopping-bag"></i></div>
        <h3>Заказов не найдено</h3><button class="btn" onclick="window.location.href='index.html#menu'">Сделать заказ</button></div>`;
                return;
            }

            ordersList.innerHTML = orders.map(order => `
        <div class="order-card">
            <div class="order-header">
                <div><div class="order-id">Заказ #${order.id}</div><div class="order-date">${order.date}</div></div>
                <span class="order-status ${order.status === 'completed' ? 'delivered' : order.status === 'cancelled' ? 'cancelled' : 'processing'}">
                    ${order.status === 'completed' ? 'Доставлен' : order.status === 'cancelled' ? 'Отменен' : 'В обработке'}
                </span>
            </div>
            <div class="order-details"><div class="order-items"><h4>Состав:</h4>
            ${order.items.map(item => `<div class="order-item"><span class="item-name">${item.name}</span>
            <span class="item-quantity">${item.quantity} шт.</span><span class="item-price">${item.price * item.quantity} ₽</span></div>`).join('')}</div>
            <div class="order-info"><div class="info-row"><span class="info-label">Способ оплаты:</span><span class="info-value">${order.payment || 'Картой'}</span></div>
            <div class="info-row"><span class="info-label">Способ доставки:</span><span class="info-value">${order.delivery || 'Курьером'}</span></div></div>
            <div class="order-total">Итого: ${order.total} ₽</div></div>
            <div class="order-actions"><button class="btn btn-outline btn-sm" onclick="repeatOrder(${order.id})">Повторить</button>
            ${order.status === 'processing' ? `<button class="btn btn-outline btn-sm btn-danger" onclick="cancelOrder(${order.id})">Отменить</button>` : ''}</div>
        </div>
    `).join('');
        }

        function repeatOrder(orderId) {
            showNotification(`Заказ #${orderId} добавлен в корзину!`, 'success');
            window.location.href = 'index.html#menu';
        }

        function cancelOrder(orderId) {
            if (confirm('Отменить заказ?')) {
                DB.updateOrderStatus(orderId, 'cancelled');
                showNotification(`Заказ #${orderId} отменен`, 'success');
                loadOrders();
            }
        }

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            if (notification) {
                notification.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i><span>${message}</span>`;
                notification.className = `notification ${type}`;
                notification.style.display = 'flex';
                setTimeout(() => notification.style.display = 'none', 3000);
            } else {
                alert(message);
            }
        }

        // Фильтры
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                loadOrders(this.dataset.filter);
            });
        });

        document.getElementById('logoutBtn')?.addEventListener('click', function (e) {
            e.preventDefault();
            if (confirm('Выйти?')) { DB.logout(); window.location.href = 'index.html'; }
        });
    </script>
</body>

</html>

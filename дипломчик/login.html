<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Ванильный дом</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #7B3F00;
            --secondary-color: #D4A76A;
            --accent-color: #FF9E6D;
            --danger-color: #EF4444;
            --success-color: #10B981;
            --warning-color: #F59E0B;
            --light-bg: #FFFDF5;
            --text-dark: #3A2615;
            --text-light: #8B7355;
            --border-radius: 20px;
            --transition: all 0.3s ease;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-hover);
            overflow: hidden;
            padding: 40px;
            position: relative;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--text-light);
            text-decoration: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .back-home:hover {
            color: var(--primary-color);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .logo img {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }

        .logo h1 {
            color: var(--primary-color);
            font-size: 1.8rem;
        }

        .auth-card h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-weight: 600;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .input-with-icon input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: var(--transition);
        }

        .input-with-icon input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(212, 167, 106, 0.2);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);
        }

        .password-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .forgot-password {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .auth-divider {
            text-align: center;
            margin: 25px 0;
            position: relative;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e5e7eb;
        }

        .auth-divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .social-auth {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .social-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .social-btn.google {
            color: #DB4437;
        }

        .social-btn.vk {
            color: #4C75A3;
        }

        .auth-footer {
            text-align: center;
            color: var(--text-light);
            margin-top: 20px;
        }

        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            border-radius: var(--border-radius);
            padding: 15px 25px;
            box-shadow: var(--shadow-hover);
            display: none;
            align-items: center;
            gap: 15px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
            border-left: 4px solid var(--accent-color);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .notification.success { border-left-color: var(--success-color); }
        .notification.error { border-left-color: var(--danger-color); }
        .notification.warning { border-left-color: var(--warning-color); }

        .notification i {
            font-size: 1.5rem;
        }

        .notification.success i { color: var(--success-color); }
        .notification.error i { color: var(--danger-color); }
        .notification.warning i { color: var(--warning-color); }
    </style>
</head>

<body>
    <div class="auth-container">
        <a href="index.html" class="back-home">
            <i class="fas fa-arrow-left"></i> На главную
        </a>

        <div class="auth-header">
            <div class="logo">
                <img src="https://psv4.userapi.com/s/v1/d2/Vgm_zT2yDUU5r16TuH-ECm51SRnVj6TGqm5x1YXPyC0j9X26UfP2cd3_gVw-6ReEnJ1BUOCJlp1RrkR9zwFDXtngwMxsj_GgnkBRhXWV4MC03FSYKL3ySq3-UDkLzCsnjg48scr10vnY/diplom_2.png" alt="Логотип">
                <h1>Ванильный дом</h1>
            </div>
        </div>

        <div class="auth-card">
            <h2>Вход в аккаунт</h2>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" class="form-control" placeholder="admin@vanilniydom.ru" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" class="form-control" placeholder="admin123" required>
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-options">
                        <label class="checkbox">
                            <input type="checkbox" id="rememberMe">
                            <span>Запомнить меня</span>
                        </label>
                        <a href="#" class="forgot-password" id="forgotPassword">Забыли пароль?</a>
                    </div>
                </div>

                <button type="submit" class="btn">Войти</button>

                <div class="auth-divider">
                    <span>Или войти через</span>
                </div>

                <div class="social-auth">
                    <button type="button" class="social-btn google">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="social-btn vk">
                        <i class="fab fa-vk"></i> VK
                    </button>
                </div>
            </form>

            <div class="auth-footer">
                <p>Нет аккаунта? <a href="#" id="registerLink">Зарегистрируйтесь</a></p>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="js/database.js"></script>
    <script>
        // Показать/скрыть пароль
        document.getElementById('togglePassword').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const icon = this.querySelector('i');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                passwordInput.type = 'password';
                icon.className = 'fas fa-eye';
            }
        });

        function showNotification(message, type = 'success') {
            const notification = document.getElementById('notification');
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                <span>${message}</span>
            `;
            notification.className = `notification ${type}`;
            notification.style.display = 'flex';
            setTimeout(() => {
                notification.style.display = 'none';
            }, 3000);
        }

        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        // === ГЛАВНАЯ ФУНКЦИЯ ВХОДА ===
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (!isValidEmail(email)) {
                showNotification('Введите корректный email', 'error');
                return;
            }

            if (!password) {
                showNotification('Введите пароль', 'error');
                return;
            }

            // Используем DB для авторизации
            const user = DB.login(email, password);

            if (user) {
                showNotification('Успешный вход!', 'success');
                
                // Перенаправляем в зависимости от роли
                setTimeout(() => {
                    if (user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'profile-index.html';
                    }
                }, 1000);
            } else {
                showNotification('Неверный email или пароль', 'error');
            }
        });

        // Регистрация
        document.getElementById('registerLink').addEventListener('click', function (e) {
            e.preventDefault();
            showRegisterModal();
        });

        function showRegisterModal() {
            const modalHTML = `
                <div class="notification-overlay" id="registerOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:1000;"></div>
                <div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:white;border-radius:20px;padding:30px;max-width:450px;width:90%;z-index:1001;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
                    <h2 style="color:var(--primary-color);margin-bottom:20px;">Регистрация</h2>
                    <form id="registerFormModal">
                        <div class="form-group"><input type="text" id="regName" class="form-control" placeholder="Имя" required style="width:100%;padding:12px;border:2px solid #eee;border-radius:10px;"></div>
                        <div class="form-group"><input type="email" id="regEmail" class="form-control" placeholder="Email" required style="width:100%;padding:12px;border:2px solid #eee;border-radius:10px;"></div>
                        <div class="form-group"><input type="tel" id="regPhone" class="form-control" placeholder="Телефон" required style="width:100%;padding:12px;border:2px solid #eee;border-radius:10px;"></div>
                        <div class="form-group"><input type="password" id="regPassword" class="form-control" placeholder="Пароль" required style="width:100%;padding:12px;border:2px solid #eee;border-radius:10px;"></div>
                        <div class="form-group"><input type="password" id="regConfirm" class="form-control" placeholder="Подтвердите пароль" required style="width:100%;padding:12px;border:2px solid #eee;border-radius:10px;"></div>
                        <button type="submit" class="btn" style="margin-top:10px;">Зарегистрироваться</button>
                        <button type="button" class="btn" id="closeRegisterBtn" style="margin-top:10px;background:#ccc;">Отмена</button>
                    </form>
                </div>
            `;
            document.body.insertAdjacentHTML('beforeend', modalHTML);

            document.getElementById('registerFormModal').addEventListener('submit', function(e) {
                e.preventDefault();
                const name = document.getElementById('regName').value;
                const email = document.getElementById('regEmail').value;
                const phone = document.getElementById('regPhone').value;
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirm').value;

                if (password !== confirm) {
                    showNotification('Пароли не совпадают', 'error');
                    return;
                }

                if (DB.getUserByEmail(email)) {
                    showNotification('Пользователь с таким email уже существует', 'error');
                    return;
                }

                const newUser = DB.createUser({ name, email, phone, password });
                DB.setCurrentUser(newUser);
                showNotification('Регистрация успешна!', 'success');
                
                setTimeout(() => {
                    window.location.href = 'profile-index.html';
                }, 1000);
            });

            document.getElementById('closeRegisterBtn').addEventListener('click', () => {
                document.getElementById('registerOverlay')?.remove();
                document.querySelector('[style*="position:fixed;top:50%"]')?.remove();
            });
            document.getElementById('registerOverlay').addEventListener('click', () => {
                document.getElementById('registerOverlay')?.remove();
                document.querySelector('[style*="position:fixed;top:50%"]')?.remove();
            });
        }

        // Забыли пароль
        document.getElementById('forgotPassword').addEventListener('click', function (e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            if (!isValidEmail(email)) {
                showNotification('Введите email для восстановления пароля', 'warning');
                return;
            }
            showNotification(`Инструкция отправлена на ${email}`, 'success');
        });

        // Социальные кнопки
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                const provider = this.classList.contains('google') ? 'Google' : 'VK';
                showNotification(`Вход через ${provider} временно недоступен`, 'warning');
            });
        });

        // Проверка авторизации при загрузке
        window.addEventListener('load', function () {
            if (DB.isAuthenticated()) {
                const user = DB.getCurrentUser();
                if (user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'profile-index.html';
                }
            }
        });
    </script>
</body>

</html>
